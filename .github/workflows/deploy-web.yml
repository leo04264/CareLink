name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
    inputs:
      apiBaseUrl:
        description: 'Backend base URL to bake into the web build (e.g. https://xxx.trycloudflare.com). Leave blank to fall back to runtime auto-detect.'
        type: string
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspaces
        run: npm ci

      - name: Export Expo web
        env:
          # Baked into the bundle at build time via Expo's EXPO_PUBLIC_* convention.
          # Empty string = fall back to runtime detection in apiConfig.ts.
          EXPO_PUBLIC_API_URL: ${{ inputs.apiBaseUrl }}
        run: npm run build:mobile:web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
