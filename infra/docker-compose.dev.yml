# Local dev dependencies for apps/api — spec §2.
# Not for production. Production uses Fly Postgres + Upstash Redis (see PR C)
# and Cloudflare R2 (see spec §8).
services:
  postgres:
    image: postgres:16-alpine
    container_name: carelink-postgres
    environment:
      POSTGRES_USER: carelink
      POSTGRES_PASSWORD: carelink
      POSTGRES_DB: carelink
    # Host port 5433 → container 5432. Avoids clashing with other local
    # postgres instances (e.g. another project's app-db on 5432).
    ports:
      - '5433:5432'
    volumes:
      - carelink-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carelink']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: carelink-redis
    # Host port 6380 → container 6379. Avoids clashing with other local
    # redis instances on 6379.
    ports:
      - '6380:6379'
    volumes:
      - carelink-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible storage for local dev. Plays the same role as Cloudflare
  # R2 in production — same API, same SDK calls, same presigned-URL shape.
  # The API server auto-creates the carelink-media bucket on boot and sets
  # a public-read policy so publicUrl actually resolves in dev.
  #   API endpoint:  http://localhost:9000
  #   Web console:   http://localhost:9001  (login with minioadmin/minioadmin)
  minio:
    image: minio/minio:latest
    container_name: carelink-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - carelink-minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  carelink-pg:
  carelink-redis:
  carelink-minio:
